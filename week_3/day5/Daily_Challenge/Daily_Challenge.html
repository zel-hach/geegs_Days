<!DOCTYPE html>
<html>
<head>
    <title>Emoji Guess Game</title>
</head>
<body>

    <h2>Guess the Emoji Name</h2>
    <p>"What is the name of this emoji?" <span id="emoji"></span></p>
    <form id="quizForm">
        <div id="options"></div>
        <br>
        <button type="submit">Submit</button>
    </form>

    <p id="result"></p>
    <div id="leaderboard"></div>

<script>
    const emojis = [
    { emoji: "😀", name: "Grinning Face" },
    { emoji: "😂", name: "Face with Tears of Joy" },
    { emoji: "😍", name: "Smiling Face with Heart-Eyes" },
    { emoji: "😎", name: "Smiling Face with Sunglasses" },
    { emoji: "😭", name: "Loudly Crying Face" },
    { emoji: "🔥", name: "Fire" },
    { emoji: "🎉", name: "Party Popper" },
    { emoji: "🚀", name: "Rocket" },
    { emoji: "🌍", name: "Globe Showing Europe-Africa" },
    { emoji: "🐱", name: "Cat Face" }
];

function rundomEmojis(){
    return emojis[Math.floor(Math.random() * emojis.length)];
}

function generateRandomOption(){
    const correctEmojie = rundomEmojis();
    const Options = emojis.filter(e => e.emoji !== correctEmojie.emoji);
    const randomOptions = Options.sort(()=> Math.random() - 0.5).slice(0,3);
    return({correctEmojie,randomOptions})
}

const game = generateRandomOption();
console.log("What is the name of this emoji?");
console.log(game.correctEmojie.emoji);
console.log("Options:");
game.randomOptions.map((option,index)=> {console.log(`${index + 1}) ${option.name}`)})


const OptionsWithCorrect = [game.correctEmojie, ...game.randomOptions]
console.log(OptionsWithCorrect);
const emojie = document.getElementById('emoji');
emojie.textContent = game.correctEmojie.emoji;
const options = document.getElementById('options');
OptionsWithCorrect.forEach(option => {
    const label = document.createElement("label");

    label.innerHTML = `
        <input type="radio" name="answer" value="${option.name}">
        ${option.name}
        <br>
    `;
    options.appendChild(label);
});

document.getElementById("quizForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const selected = document.querySelector('input[name="answer"]:checked');

    if (!selected) {
        alert("Please select an answer!");
        return;
    }

    const response = await fetch("http://localhost:3000/guess", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            answer: selected.value,
            correctEmojie: game.correctEmojie.name
        })
    });

    const data = await response.json();
    document.getElementById("result").textContent = data.message;
    if (data.correct) {
        result.style.color = "green";
    } else {
        result.style.color = "red";
    }
});

async function loadLeaderboard() {
    const res = await fetch("http://localhost:3000/leaderboard");
    const data = await res.json();

    const board = document.getElementById("leaderboard");
    board.innerHTML = "";

    data.forEach(player => {
        board.innerHTML += `<li>${player.name} : ${player.score}</li>`;
    });
}
loadLeaderboard();
</script>
